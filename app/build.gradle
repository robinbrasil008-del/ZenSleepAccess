plugins {
    id 'com.android.application'
}

android {
    namespace 'com.zensleep'
    compileSdk 34

    defaultConfig {
        applicationId "com.zensleep"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        buildConfig true
    }
}

dependencies {

    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.cardview:cardview:1.0.0'

    // ✅ Necessário para salvar lista de alarmes (AlarmStorage.java)
    implementation 'com.google.code.gson:gson:2.10.1'
}
