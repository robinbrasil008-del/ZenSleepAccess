plugins {
    id 'com.android.application'
}

android {
    namespace 'com.zensleep'
    compileSdk 33

    defaultConfig {
        applicationId "com.zensleep"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'com.google.android.material:material:1.11.0'
}
