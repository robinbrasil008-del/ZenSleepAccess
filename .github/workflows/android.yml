name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Give permission to wrapper
        run: chmod +x gradlew

      - name: Build using wrapper (Release)
        run: ./gradlew clean assembleRelease -x lint -x lintVitalRelease --no-daemon

      # 👇 O MÉTODO À PROVA DE BALAS: Assinar manualmente, sem plugins bugados! 👇
      - name: Sign APK Manually
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. Cria o arquivo da chave a partir do seu segredo Base64
          echo $KEYSTORE_BASE64 | base64 -d > keystore.jks
          
          # 2. Pega a versão mais recente das ferramentas do Android instaladas no GitHub
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # 3. Prepara o APK (Zipalign)
          $BUILD_TOOLS/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app-release-aligned.apk
          
          # 4. Assina o APK de forma definitiva
          $BUILD_TOOLS/apksigner sign --ks keystore.jks --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$KEYSTORE_PASSWORD" --key-pass "pass:$KEY_PASSWORD" --out app-release-assinado.apk app-release-aligned.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-assinado
          path: app-release-assinado.apk
