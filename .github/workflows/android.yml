name: Build AAB para Play Store

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Give permission to wrapper
        run: chmod +x gradlew

      # 👇 1. Gera o AAB em modo Release (ignorando os erros chatos do Lint)
      - name: Build AAB (Release)
        run: ./gradlew clean bundleRelease -x lint -x lintVitalRelease --no-daemon

      # 👇 2. Assina o AAB usando a chave que salvamos no repositório!
      - name: Assinar AAB
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore minha-chave.jks -storepass "15349276" -keypass "15349276" app/build/outputs/bundle/release/app-release.aab "meu-app"

      # 👇 3. Entrega o arquivo .aab pronto
      - name: Upload AAB Assinado
        uses: actions/upload-artifact@v4
        with:
          name: app-release-assinado-playstore
          path: app/build/outputs/bundle/release/app-release.aab
