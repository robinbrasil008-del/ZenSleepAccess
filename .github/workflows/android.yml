name: Build APK Assinado

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Give permission to wrapper
        run: chmod +x gradlew

      - name: Build using wrapper
        run: ./gradlew clean assembleDebug --no-daemon

      - name: Assinar APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. Limpa espaços e quebras de linha do texto antes de converter para arquivo
          echo "$KEYSTORE_B64" | tr -d '\n\r ' | base64 -d > keystore.jks
          
          # 2. Localiza as ferramentas do Android
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # 3. Alinha e Assina
          $BUILD_TOOLS/zipalign -v -p 4 app/build/outputs/apk/debug/app-debug.apk app-alinhado.apk
          $BUILD_TOOLS/apksigner sign --ks keystore.jks --ks-key-alias "$ALIAS" --ks-pass "pass:$KS_PASS" --key-pass "pass:$KEY_PASS" --out app-final-assinado.apk app-alinhado.apk

      - name: Upload APK Assinado
        uses: actions/upload-artifact@v4
        with:
          name: app-final-assinado
          path: app-final-assinado.apk
